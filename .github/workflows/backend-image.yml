name: backend-image

on:
  push:
    branches:
      - k8s-findit 
    paths:
      - "findit_backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch: 

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: true 

jobs:
  # ─── Docker Image ──────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./findit_backend
          file: ./findit_backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ─── DigitalOcean Kubernetes ────────────────
  deploy-staging:
    name: Deploy to DigitalOcean Kubernetes
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/k8s-findit'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/findit-backend \
            findit-backend=${{ secrets.DOCKERHUB_USERNAME }}/findit-backend:sha-${{ github.sha }}

      - name: Verify Deployment Status
        run: |
          kubectl rollout status deployment/findit-backend --timeout=180s

      - name: Final Health Check
        run: |
          echo "Deployment successful! Checking rollout history..."
          kubectl rollout history deployment/findit-backend