name: backend-image

on:
  push:
    branches:
      - main
    paths:
      - "findit_backend/**"
      - "FindIt_frontend/**"
      - "deploy/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch:

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect backend-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'findit_backend/**'
              - '.github/workflows/backend-image.yml'

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./findit_backend
          file: ./findit_backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-staging:
    name: deploy-staging
    needs:
      - detect-changes
      - build-and-push
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
      REMOTE_REPO_DIR: /opt/findit/repo/ECE1779_Course_Project
      REMOTE_ENV_FILE: /opt/findit/shared/.env.stack
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy backend to staging
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BACKEND_IMAGE: ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
          SHOULD_UPDATE_BACKEND_IMAGE: ${{ needs.detect-changes.outputs.backend }}
        run: |
          ssh \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -o TCPKeepAlive=yes \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "BACKEND_IMAGE='$BACKEND_IMAGE' SHOULD_UPDATE_BACKEND_IMAGE='$SHOULD_UPDATE_BACKEND_IMAGE' REMOTE_REPO_DIR='$REMOTE_REPO_DIR' REMOTE_ENV_FILE='$REMOTE_ENV_FILE' bash -se" <<'EOF'
          set -euo pipefail

          cd "$REMOTE_REPO_DIR"
          git fetch origin
          git checkout main
          git pull --ff-only origin main

          if [ "${SHOULD_UPDATE_BACKEND_IMAGE:-false}" != "true" ]; then
            unset BACKEND_IMAGE
          fi

          SKIP_GIT_SYNC=1 \
          DEPLOY_BRANCH=main \
          REMOTE_ENV_FILE="$REMOTE_ENV_FILE" \
          bash ./deploy/manager/deploy-app.sh
          EOF
