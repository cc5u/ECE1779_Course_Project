name: backend-image

on:
  push:
    branches:
      - main
      - backend_dev
    paths:
      - "findit_backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch:

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./findit_backend
          file: ./findit_backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-staging:
    name: deploy-staging
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/backend_dev'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
      REMOTE_REPO_DIR: /opt/findit/repo/ECE1779_Course_Project
      REMOTE_ENV_FILE: /opt/findit/shared/.env.stack
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy backend to staging
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BACKEND_IMAGE: ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "BACKEND_IMAGE='$BACKEND_IMAGE' REMOTE_REPO_DIR='$REMOTE_REPO_DIR' REMOTE_ENV_FILE='$REMOTE_ENV_FILE' bash -se" <<'EOF'
          set -euo pipefail

          cd "$REMOTE_REPO_DIR"
          git fetch origin
          git checkout backend_dev
          git pull --ff-only origin backend_dev

          cd findit_backend

          if grep -q '^BACKEND_IMAGE=' "$REMOTE_ENV_FILE"; then
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=$BACKEND_IMAGE|" "$REMOTE_ENV_FILE"
          else
            printf '\nBACKEND_IMAGE=%s\n' "$BACKEND_IMAGE" >> "$REMOTE_ENV_FILE"
          fi

          ENV_FILE="$REMOTE_ENV_FILE" STACK_SUBCOMMAND=config ./scripts/deploy-stack.sh
          ENV_FILE="$REMOTE_ENV_FILE" ./scripts/deploy-stack.sh

          for attempt in $(seq 1 30); do
            current_image=$(docker service inspect --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' findit_backend)
            case "$current_image" in
              "$BACKEND_IMAGE"|"$BACKEND_IMAGE"@*)
                break
                ;;
            esac

            if [ "$attempt" -eq 30 ]; then
              echo "Timed out waiting for findit_backend to target image $BACKEND_IMAGE" >&2
              docker service inspect findit_backend
              exit 1
            fi

            sleep 2
          done

          for attempt in $(seq 1 60); do
            replicas=$(docker service ls --filter name=findit_backend --format '{{.Replicas}}')
            if [ "$replicas" = "1/1" ] && curl --fail --silent --show-error http://localhost:3000/api/health >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for findit_backend to become healthy" >&2
              docker service ps findit_backend --no-trunc
              docker service logs --tail 200 findit_backend
              exit 1
            fi

            sleep 2
          done

          docker service ps findit_backend --no-trunc
          curl --fail --silent --show-error http://localhost:3000/api/health
          EOF
