name: backend-k8s-cicd

on:
  push:
    branches:
      - k8s-findit
    paths:
      - "findit_backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch:

concurrency:
  group: backend-k8s-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./findit_backend
          file: ./findit_backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-staging:
    name: deploy-backend-to-k8s
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/k8s-findit'
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/findit-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install doctl
        run: |
          DOCTL_VERSION="1.147.0"
          curl -fsSL "https://github.com/digitalocean/doctl/releases/download/v${DOCTL_VERSION}/doctl-${DOCTL_VERSION}-linux-amd64.tar.gz" \
            | tar -xz
          sudo mv doctl /usr/local/bin/doctl
          doctl version

      - name: Authenticate doctl
        run: doctl auth init --access-token "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}"

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f ./findit_backend/k8s/namespace.yaml
          kubectl apply -f ./findit_backend/k8s/backend-config.yaml
          kubectl apply -f ./findit_backend/k8s/postgres.yaml
          kubectl apply -f ./findit_backend/k8s/redis.yaml
          kubectl apply -f ./findit_backend/k8s/backend.yaml

      - name: Update backend image
        run: |
          kubectl -n findit set image deployment/findit-backend \
            findit-backend=${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}

      - name: Verify backend rollout
        run: |
          kubectl -n findit rollout status deployment/redis --timeout=180s
          kubectl -n findit rollout status deployment/postgres --timeout=180s
          kubectl -n findit rollout status deployment/findit-backend --timeout=180s
          kubectl -n findit get pods
          kubectl -n findit get svc
