apiVersion: apps/v1
kind: Deployment
metadata:
  name: findit-backend
  namespace: findit
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: findit-backend
  template:
    metadata:
      labels:
        app: findit-backend
    spec:
      containers:
        - name: findit-backend
          image: chiachun5/findit-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: findit-backend-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: findit-backend-config
                  key: NODE_ENV
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/findit?schema=public"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: JWT_EXPIRES_IN
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: CORS_ORIGIN
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: BASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: REDIS_URL
            - name: DO_SPACES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_ENDPOINT
            - name: DO_SPACES_BUCKET
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_BUCKET
            - name: DO_SPACES_KEY
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_KEY
            - name: DO_SPACES_SECRET
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_SECRET
            - name: DO_SPACES_REGION
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_REGION
            - name: DO_SPACES_CDN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: findit-secrets
                  key: DO_SPACES_CDN_ENDPOINT
---
apiVersion: v1
kind: Service
metadata:
  name: findit-backend
  namespace: findit
spec:
  type: ClusterIP
  selector:
    app: findit-backend
  ports:
    - port: 80
      targetPort: 3000
