services:
  # ─── PostgreSQL Database ────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: lostandfound-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lostandfound
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lostandfound"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lostandfound-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/lostandfound?schema=public}
      PORT: "3000"
      NODE_ENV: production
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
      BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
